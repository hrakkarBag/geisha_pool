<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Geisha Bar — Reservas de Billar</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#c9a84c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Geisha Bar">
<link rel="apple-touch-icon" href="./icon-192.png">

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1e2530;--border:#2a3242;
  --felt:#1a3a2a;--gold:#c9a84c;--gold-dim:#8a6c2a;
  --green:#2ea84e;--red:#e53e3e;--amber:#d97706;--blue:#3b82f6;
  --text:#e8edf4;--muted:#7a8899;
  --pend-bg:#2d1f0a;--pend-b:#d97706;
  --res-bg:#0b2416;--res-b:#2ea84e;
  --rech-bg:#1f0b0b;--rech-b:#e53e3e;
  --radius:14px;--r-sm:8px;--r-pill:999px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);--trans:all .2s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding:12px;
  background-image:
    radial-gradient(circle at 20% 80%,rgba(26,58,42,.18) 0%,transparent 50%),
    radial-gradient(circle at 80% 10%,rgba(201,168,76,.07) 0%,transparent 40%);
}
.app{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

/* Header */
.app-header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);flex-wrap:wrap;
}
.logo{font-family:'DM Serif Display',serif;font-size:clamp(1.1rem,3vw,1.5rem);color:var(--gold);white-space:nowrap}
.logo span{color:var(--muted);font-size:.7em;font-family:'DM Sans',sans-serif;margin-left:6px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input[type=date].date-pick{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 12px;border-radius:var(--r-pill);font-family:'DM Sans',sans-serif;
  font-size:.9rem;cursor:pointer;transition:var(--trans);
}
input[type=date].date-pick:focus{outline:none;border-color:var(--gold)}
.badge-role{
  padding:6px 12px;border-radius:var(--r-pill);background:var(--felt);
  color:var(--gold);font-weight:700;font-size:.82rem;border:1px solid var(--gold-dim);white-space:nowrap;
}
.btn{
  padding:8px 14px;border-radius:var(--r-pill);border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:.82rem;transition:var(--trans);white-space:nowrap;
}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:var(--red);color:#fff}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-gold{background:var(--felt);color:var(--gold);border:1px solid var(--gold-dim)}.btn-gold:hover{background:var(--gold);color:#000}
.btn-success{background:#14532d;color:#86efac}.btn-success:hover{background:var(--green);color:#fff}
.btn-warn{background:#451a03;color:#fde68a}.btn-warn:hover{background:var(--amber);color:#000}

/* Form */
.form-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:end;
}
.form-card .form-msg{grid-column:1/-1;font-size:.85rem;margin-top:-6px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.92rem;transition:var(--trans);
}
.field input:focus{outline:none;border-color:var(--gold)}
.btn-submit{
  padding:10px 18px;border-radius:var(--r-sm);border:none;background:var(--gold);
  color:#0d0a00;font-weight:700;font-size:.9rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:var(--trans);align-self:end;
}
.btn-submit:hover{background:#e0bd6b}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

.srv-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Day view — scroll sincronizado */
.day-view{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.day-scroll{display:grid;grid-template-columns:56px 1fr;overflow-y:auto;max-height:min(660px,70vh)}
.hours-col{background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.hour-label{
  display:flex;align-items:flex-start;justify-content:flex-end;
  padding:6px 8px 0 0;color:var(--muted);font-size:.75rem;font-weight:600;
  font-variant-numeric:tabular-nums;height:60px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;
}
.timeline{position:relative;background:var(--surface)}
.line-hour{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.04)}
.line-hour.prominent{background:rgba(255,255,255,.08)}

/* Blocks */
.res-block{
  position:absolute;left:6px;right:8px;border-radius:10px;padding:8px 10px;
  display:flex;flex-direction:column;gap:4px;overflow:hidden;transition:filter .15s;
}
.res-block:hover{filter:brightness(1.08)}
.r-name{font-weight:700;font-size:.88rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:.76rem;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.res-pend{background:var(--pend-bg);border-left:3px solid var(--pend-b);color:#fde68a}
.res-res{background:var(--res-bg);border-left:3px solid var(--res-b);color:#bbf7d0}
.res-rech{background:var(--rech-bg);border-left:3px solid var(--rech-b);color:#fca5a5;opacity:.6}
.r-badge{display:inline-block;padding:2px 7px;border-radius:var(--r-pill);font-size:.7rem;font-weight:700;align-self:flex-start}
.badge-p{background:rgba(217,119,6,.25);color:#fbbf24}
.badge-r{background:rgba(46,168,78,.25);color:#86efac}
.badge-x{background:rgba(229,62,62,.25);color:#fca5a5}
.ra-btn{padding:3px 8px;border-radius:var(--r-pill);border:none;cursor:pointer;font-size:.7rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:var(--trans)}
.ra-approve{background:rgba(46,168,78,.2);color:#86efac}.ra-approve:hover{background:var(--green);color:#fff}
.ra-reject{background:rgba(229,62,62,.2);color:#fca5a5}.ra-reject:hover{background:var(--red);color:#fff}
.ra-edit{background:rgba(59,130,246,.2);color:#93c5fd}.ra-edit:hover{background:var(--blue);color:#fff}
.ra-delete{background:rgba(229,62,62,.12);color:#f87171}.ra-delete:hover{background:#7f1d1d;color:#fca5a5}

/* Lists */
.lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.list-card h3{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-pend{background:var(--pend-b)}.dot-res{background:var(--res-b)}.dot-rech{background:var(--rech-b)}
.res-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.res-item:last-child{border-bottom:none}
.ri-name{font-weight:700;font-size:.9rem}
.ri-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
.ri-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.empty{text-align:center;color:var(--muted);font-size:.85rem;padding:12px 0}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;gap:20px;flex-wrap:wrap}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;box-shadow:var(--shadow);flex-shrink:0;align-self:flex-start;margin-top:clamp(16px,5vh,60px)}
.login-logo{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--gold);text-align:center;margin-bottom:4px}
.login-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.login-field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.95rem;transition:var(--trans)}
.login-field input:focus{outline:none;border-color:var(--gold)}
.login-btns{display:flex;gap:10px;margin-top:6px}
.login-btns button{flex:1;padding:11px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;transition:var(--trans)}
.btn-login-main{background:var(--gold);color:#0d0a00}.btn-login-main:hover{background:#e0bd6b}
.btn-login-srv{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.btn-login-srv:hover{color:var(--text)}
.login-msg{margin-top:10px;font-size:.85rem;color:#f87171;text-align:center;min-height:20px}

/* Vista rápida */
.vr-card{
  width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;box-shadow:var(--shadow);
  align-self:flex-start;margin-top:clamp(16px,5vh,60px);
}
.vr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.vr-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--gold)}
.vr-date{font-size:.8rem;color:var(--muted);background:var(--surface2);padding:5px 10px;border-radius:var(--r-pill);border:1px solid var(--border)}
.vr-legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.vr-legend span{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)}
.vr-legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.vr-mini-day{display:grid;grid-template-columns:44px 1fr;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.vr-hours{background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.vr-hlabel{display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0;color:var(--muted);font-size:.65rem;font-weight:600;height:48px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.vr-timeline{position:relative;background:var(--surface);overflow:hidden}
.vr-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.05)}
.vr-block{position:absolute;left:4px;right:4px;border-radius:6px;padding:4px 6px;font-size:.72rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.vr-empty{text-align:center;color:var(--muted);font-size:.82rem;padding:20px 0}
@media(max-width:900px){.vr-card{max-width:100%}}
@media(max-width:600px){.login-wrap{flex-direction:column;align-items:center}.login-card,.vr-card{margin-top:8px}}

/* Msg bar */
.msg-bar{padding:10px 14px;border-radius:var(--r-sm);font-size:.87rem;background:var(--felt);color:var(--gold);border:1px solid var(--gold-dim);display:none}
.msg-bar.show{display:block}
.msg-bar.err{background:#1f0b0b;color:#fca5a5;border-color:#7f1d1d}
.msg-bar.ok{background:var(--res-bg);color:#86efac;border-color:#14532d}

/* Loading */
.loading{display:none;position:fixed;inset:0;background:rgba(13,17,23,.7);z-index:9990;align-items:center;justify-content:center;font-size:1.1rem;color:var(--gold);gap:12px}
.loading.show{display:flex}
.spin{width:22px;height:22px;border:3px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Realtime badge */
.rt-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,168,78,.6)}70%{box-shadow:0 0 0 6px rgba(46,168,78,0)}100%{box-shadow:0 0 0 0 rgba(46,168,78,0)}}

/* Offline / Update */
#offlineBadge{display:none;position:fixed;top:12px;right:12px;background:#1f0b0b;color:#fca5a5;border:1px solid #7f1d1d;padding:6px 12px;border-radius:var(--r-pill);font-size:.78rem;font-weight:700;z-index:9998}
#offlineBadge.show{display:block}
#updateBanner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--felt);border:1px solid var(--gold-dim);color:var(--gold);padding:10px 18px;border-radius:var(--r-pill);font-size:.85rem;font-weight:600;gap:12px;align-items:center;box-shadow:var(--shadow);white-space:nowrap}
#updateBanner.show{display:flex}
#updateBanner button{background:var(--gold);color:#000;border:none;padding:5px 12px;border-radius:var(--r-pill);cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif}

/* Responsive */
@media(max-width:680px){
  body{padding:8px}
  .app-header{padding:10px 12px;gap:8px}
  .header-right{gap:6px}
  .form-card{grid-template-columns:1fr 1fr;row-gap:10px}
  .form-card .btn-submit{grid-column:1/-1}
  .lists-grid{grid-template-columns:1fr}
  .day-scroll{grid-template-columns:44px 1fr}
  .hour-label{font-size:.68rem;padding:5px 5px 0 0}
  .res-block{left:4px;right:4px;padding:5px 7px}
  .r-name{font-size:.82rem}.r-meta{font-size:.7rem}
  .logo span{display:none}
  .btn{padding:7px 10px;font-size:.78rem}
}
@media(max-width:420px){
  .form-card{grid-template-columns:1fr}
  .form-card .btn-submit{width:100%}
  .res-item{flex-direction:column;align-items:flex-start}
  .ri-actions{width:100%;justify-content:flex-start}
}

.dur-stepper{display:flex;align-items:center;gap:6px;width:100%}
.dur-stepper button{
  width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:1.1rem;font-weight:700;
  cursor:pointer;flex-shrink:0;transition:var(--trans);line-height:1;
}
.dur-stepper button:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.dur-stepper button:disabled{opacity:.3;cursor:not-allowed}
#durDisplay{
  flex:1;text-align:center;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:6px 4px;font-size:.92rem;font-weight:700;
  color:var(--gold);white-space:nowrap;
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>
<body>

<div id="offlineBadge">⚡ Sin conexión</div>
<div id="updateBanner">✨ Nueva versión disponible <button id="btnUpdate">Actualizar</button></div>
<div class="loading" id="loader"><div class="spin"></div> Cargando…</div>
<div id="root"></div>

<script>
/* ══════════════════════════════════════════════
   CONFIGURACIÓN
══════════════════════════════════════════════ */
const SUPABASE_URL  = 'https://pvoafqlwevbmfmdbdjsx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2b2FmcWx3ZXZibWZtZGJkanN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDIyOTgsImV4cCI6MjA4ODYxODI5OH0.xdv1XQiafCrVWs1ccz1K_P472pNtB-rvlQ5fdQUd51U';
const SERVER_PIN  = '0213';
const NTFY_TEMA = 'geisha-billar-k9x3'; // ← pon aquí tu tema secreto, ej: 'geisha-billar-x7k2'
const OPEN  = 13 * 60;   // 13:00
const CLOSE = 24 * 60;   // 24:00
const PX_MIN = 1;

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── Utilidades ── */
const $      = id => document.getElementById(id);
const pad    = n  => String(n).padStart(2,'0');
const today  = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const fmt    = m  => `${pad(Math.floor(m/60))}:${pad(m%60)}`;
const t2m    = t  => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const nowMin = () => { const d=new Date(); return d.getHours()*60+d.getMinutes(); };
const uid    = () => Date.now()+'-'+Math.random().toString(36).slice(2,8);
const loader = v  => $('loader').classList.toggle('show', v);

function overlap(start, dur, list, skipId=null){
  const end = start + dur;
  return list.some(r => {
    if(r.id === skipId || r.estado === 'rechazado') return false;
    return start < r.inicio + r.duracion && end > r.inicio;
  });
}

/* ── BD ── */
async function fetchReservas(fecha){
  const {data, error} = await db.from('reservas').select('*').eq('fecha', fecha).order('inicio');
  if(error){ console.error('fetchReservas', error); return []; }
  return data || [];
}
async function insertReserva(r){
  const {error} = await db.from('reservas').insert(r);
  if(error) throw error;
}
async function rpc(fn, params){
  const {error} = await db.rpc(fn, params);
  if(error) throw error;
}

/* ── Estado (persiste en sessionStorage) ── */
const ss = localStorage;
let modo    = ss.getItem('modo') || 'login';
let srvPin  = ss.getItem('srvPin') || '';
let cliente = (() => { try { return JSON.parse(ss.getItem('cliente') || 'null') || {nombre:'',ci:''}; } catch(e){ return {nombre:'',ci:''}; } })();
let fecha   = today();
let msg     = {text:'', type:''};

/* ── Realtime ── */
let rtChan   = null;
let rtStatus = 'off';

/* ── Guards de concurrencia ── */
let solicitando  = false;   // evita doble-submit del cliente
let renderingApp = false;   // evita renders solapados
let pendingRender = false;  // encola el render si ya hay uno en curso

function suscribir(){
  if(rtChan) db.removeChannel(rtChan);
  rtStatus = 'connecting';
  rtChan = db.channel('reservas-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'reservas'}, payload => {
      renderApp();
      if(payload.eventType === 'INSERT'){
        pushNotif(payload.new);
        ntfyNotif(payload.new);
      }
    })
    .subscribe(status => {
      if(status === 'SUBSCRIBED')                              { rtStatus = 'ok';    updateRtBadge(); }
      else if(status === 'CLOSED' || status === 'CHANNEL_ERROR'){ rtStatus = 'error'; updateRtBadge(); }
    });
}
function desuscribir(){
  if(rtChan){ db.removeChannel(rtChan); rtChan = null; }
  rtStatus = 'off';
}
function updateRtBadge(){
  const el = $('rtBadge'); if(!el) return;
  const map = { connecting:{label:'Conectando…',dot:'#d97706'}, ok:{label:'En vivo',dot:'#2ea84e'}, error:{label:'Sin Realtime',dot:'#e53e3e'} };
  const s = map[rtStatus] || map.ok;
  el.innerHTML = `${s.label}<span class="rt-dot" style="background:${s.dot}"></span>`;
}

async function ntfyNotif(r){
  if(!NTFY_TEMA) return;
  try {
    await fetch(`https://ntfy.sh/${NTFY_TEMA}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain; charset=utf-8',
        'Title': '🎱 Nueva solicitud — Geisha Bar',
        'Priority': 'high',
        'Tags': 'billiards,new'
      },
      body: `👤 ${r.cliente} (CI: ${r.ci})\n🕐 ${fmt(r.inicio)} – ${fmt(r.inicio+r.duracion)}\n📅 ${r.fecha}`
    });
  } catch(e){ console.warn('ntfy error', e); }
}

async function pedirPermiso(){
  if('Notification' in window && Notification.permission === 'default')
    await Notification.requestPermission();
}
function pushNotif(r){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  new Notification('🎱 Nueva solicitud — Geisha Bar', {
    body: `${r.cliente} (CI ${r.ci}) · ${fmt(r.inicio)}–${fmt(r.inicio+r.duracion)}`,
    icon: './icon-192.png', tag: 'res-'+r.id, renotify: true
  });
}

/* ── Vista Rápida ── */
function renderVistaRapida(reservas){
  const wrap = $('vrWrap'); if(!wrap) return;
  const activas = reservas.filter(r => r.estado !== 'rechazado');
  if(!activas.length){
    wrap.innerHTML = '<div class="vr-empty">🟢 Mesa disponible todo el día</div>'; return;
  }
  const VR = 0.8;
  const altura = (CLOSE - OPEN) * VR;
  let hoursHTML = '', linesHTML = '', blocksHTML = '';
  for(let h = Math.floor(OPEN/60); h < Math.floor(CLOSE/60); h++){
    hoursHTML += `<div class="vr-hlabel" style="height:${60*VR}px">${pad(h)}:00</div>`;
    linesHTML += `<div class="vr-line" style="top:${(h*60-OPEN)*VR}px"></div>`;
  }
  reservas.forEach(r => {
    const top = (r.inicio - OPEN) * VR;
    const h   = Math.max(r.duracion * VR, 18);
    const bg  = r.estado==='pendiente' ? 'var(--pend-bg)' : r.estado==='reservado' ? 'var(--res-bg)' : 'var(--rech-bg)';
    const bc  = r.estado==='pendiente' ? 'var(--pend-b)'  : r.estado==='reservado' ? 'var(--res-b)'  : 'var(--rech-b)';
    blocksHTML += `<div class="vr-block" style="top:${top}px;height:${h}px;background:${bg};border-left:3px solid ${bc}">${fmt(r.inicio)}–${fmt(r.inicio+r.duracion)}</div>`;
  });
  wrap.innerHTML = `
    <div class="vr-mini-day">
      <div class="vr-hours">${hoursHTML}</div>
      <div class="vr-timeline" style="height:${altura}px">${linesHTML}${blocksHTML}</div>
    </div>`;
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
async function renderApp(){
  if(renderingApp){ pendingRender = true; return; }
  renderingApp = true; pendingRender = false;
  try { await _renderApp(); } finally {
    renderingApp = false;
    if(pendingRender) renderApp();
  }
}

async function _renderApp(){
  const esSrv  = modo === 'servidor';
  const notifOk = 'Notification' in window && Notification.permission === 'granted';

  $('root').innerHTML = `
    <div class="app">
      <header class="app-header">
        <div class="logo"><img src="./icon-192.png" style="width:28px;height:28px;object-fit:contain;border-radius:6px;vertical-align:middle;margin-right:8px" alt="">Geisha Bar<span>/ Reservas</span></div>
        <div class="header-right">
          <input type="date" class="date-pick" id="fechaPick" value="${fecha}">
          <span class="badge-role">${esSrv ? '🔧 Servidor' : '👤 '+cliente.nombre}</span>
          ${esSrv ? `
            <span class="badge-role" id="rtBadge" style="font-size:.72rem;display:inline-flex;align-items:center;gap:4px">
              Conectando…<span class="rt-dot" style="background:#d97706"></span>
            </span>
            <button class="btn btn-gold" id="btnCheck">Verificar llegada</button>
            ${!notifOk
              ? `<button class="btn btn-gold" id="btnNotif">🔔 Activar avisos</button>`
              : `<span class="badge-role" style="font-size:.72rem">🔔 Avisos activos</span>`}
          ` : ''}
          <button class="btn btn-ghost" id="btnSalir">${esSrv ? 'Salir' : 'Cerrar sesión'}</button>
        </div>
      </header>

      ${!esSrv ? `
        <div class="form-card">
          <div class="field"><label>Hora inicio</label>
            <select id="fHora" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.92rem">
              ${(()=>{let o='';for(let m=OPEN;m<CLOSE;m+=30){const h=Math.floor(m/60),mn=m%60,ampm=h>=12?'PM':'AM',h12=h%12||12;o+=`<option value="${pad(h)+':'+pad(mn)}">${h12}:${pad(mn)} ${ampm}</option>`;}return o;})()}
            </select>
          </div>
          <div class="field"><label>Tiempo a jugar</label>
            <div class="dur-stepper">
              <button id="durMinus" type="button">−</button>
              <span id="durDisplay">1h 00min</span>
              <input type="hidden" id="fDur" value="60">
              <button id="durPlus" type="button">+</button>
            </div>
          </div>
          <button class="btn-submit" id="btnSolicitar">Solicitar</button>
          <div class="form-msg" id="fMsg"></div>
        </div>
      ` : `
        <div class="srv-bar">
          <button class="btn btn-primary" id="btnRefresh">↻ Actualizar</button>
          <button class="btn btn-ghost" id="btnToCliente">Vista cliente</button>
        </div>
      `}

      <div class="msg-bar ${msg.text ? 'show '+(msg.type||'') : ''}" id="msgBar">${msg.text||''}</div>

      ${!esSrv ? '<div class="list-card" id="misReservas" style="display:none"><h3><span class="dot dot-pend"></span> Mis solicitudes</h3><div id="misList"></div></div>' : ''}

      <div class="day-view">
        <div class="day-scroll">
          <div class="hours-col" id="hCol"></div>
          <div class="timeline" id="tLine"></div>
        </div>
      </div>

      ${esSrv ? `
        <div class="lists-grid">
          <div class="list-card">
            <h3><span class="dot dot-pend"></span> Pendientes</h3>
            <div id="lPend"><div class="empty">Cargando…</div></div>
          </div>
          <div class="list-card">
            <h3><span class="dot dot-res"></span> Reservados</h3>
            <div id="lRes"><div class="empty">Cargando…</div></div>
          </div>
        </div>
        <div class="list-card">
          <h3><span class="dot dot-rech"></span> Rechazadas</h3>
          <div id="lRech"><div class="empty">Cargando…</div></div>
        </div>
      ` : ''}
    </div>`;

  /* Event listeners */
  $('fechaPick').onchange = e => { fecha = e.target.value; msg = {text:'',type:''}; renderApp(); };
  $('btnSalir').onclick = () => {
    msg = {text:'', type:''};
    desuscribir();
    modo = 'login'; srvPin = ''; cliente = {nombre:'', ci:''};
    ss.removeItem('modo'); ss.removeItem('srvPin'); ss.removeItem('cliente');
    renderLogin();
  };
  if(!esSrv){
    $('btnSolicitar').onclick = solicitar;

    // Stepper de duración — recalcula máximo según hora seleccionada
    function durFmt(m){ return m < 60 ? `${m}min` : m%60===0 ? `${m/60}h` : `${Math.floor(m/60)}h ${m%60}min`; }
    function durMax(){ return CLOSE - t2m($('fHora').value); }
    function stepDur(delta){
      const inp = $('fDur'), cur = parseInt(inp.value,10);
      const next = Math.min(Math.max(cur + delta, 30), durMax());
      inp.value = next;
      $('durDisplay').textContent = durFmt(next);
      $('durMinus').disabled = next <= 30;
      $('durPlus').disabled  = next >= durMax();
    }
    $('durMinus').onclick = () => stepDur(-30);
    $('durPlus').onclick  = () => stepDur(+30);
    $('fHora').onchange   = () => {
      const inp = $('fDur'), max = durMax();
      if(parseInt(inp.value,10) > max){ inp.value = max; $('durDisplay').textContent = durFmt(max); }
      $('durMinus').disabled = parseInt(inp.value,10) <= 30;
      $('durPlus').disabled  = parseInt(inp.value,10) >= max;
    };
    // Init
    stepDur(0);
  } else {
    $('btnRefresh').onclick   = () => renderApp();
    $('btnToCliente').onclick = () => { modo = 'cliente'; cliente = {nombre:'',ci:''}; ss.setItem('modo','cliente'); ss.removeItem('cliente'); renderApp(); };
    $('btnCheck').onclick     = verificarLlegada;
    if($('btnNotif')) $('btnNotif').onclick = async () => { await pedirPermiso(); renderApp(); };
    setTimeout(updateRtBadge, 100);
  }

  /* Cargar datos */
  loader(true);
  try {
    const reservas = await fetchReservas(fecha);
    renderDay(reservas);
    if(esSrv) renderListas(reservas);
    else renderMisSolicitudes(reservas);
  } catch(e){
    showMsg('Error al conectar con la base de datos.', 'err');
  } finally {
    loader(false);
  }
}

/* ── Day view ── */
function renderDay(reservas){
  const tLine = $('tLine'), hCol = $('hCol');
  if(!tLine || !hCol) return;
  tLine.style.height = ((CLOSE - OPEN) * PX_MIN) + 'px';
  tLine.innerHTML = ''; hCol.innerHTML = '';

  for(let h = Math.floor(OPEN/60); h < Math.floor(CLOSE/60); h++){
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.style.height = (60 * PX_MIN) + 'px';
    lbl.textContent = pad(h) + ':00';
    hCol.appendChild(lbl);
    const line = document.createElement('div');
    line.className = 'line-hour' + (h % 2 === 0 ? ' prominent' : '');
    line.style.top = ((h*60 - OPEN) * PX_MIN) + 'px';
    tLine.appendChild(line);
  }

  const esSrv = modo === 'servidor';
  reservas.forEach(r => {
    const top    = (r.inicio - OPEN) * PX_MIN;
    const esProp = !!(cliente.ci && cliente.ci === r.ci);
    const height = Math.max(r.duracion * PX_MIN, (esProp && r.estado === 'pendiente') ? 80 : 30);
    const canEdit    = esSrv || (esProp && r.estado === 'pendiente');
    const canApprove = esSrv && r.estado === 'pendiente';
    const cls = r.estado==='pendiente' ? 'res-pend' : r.estado==='reservado' ? 'res-res' : 'res-rech';
    const bc  = r.estado==='pendiente' ? 'badge-p'  : r.estado==='reservado' ? 'badge-r' : 'badge-x';
    const bt  = r.estado==='pendiente' ? 'Pendiente' : r.estado==='reservado' ? 'Reservado' : 'Rechazado';

    const div = document.createElement('div');
    div.className = `res-block ${cls}`;
    div.style.cssText = `top:${top}px;height:${height}px`;
    div.innerHTML = `
      <div class="r-name">${r.cliente}</div>
      <div class="r-meta">${fmt(r.inicio)} – ${fmt(r.inicio+r.duracion)} · CI ${r.ci||'—'}</div>
      <span class="r-badge ${bc}">${bt}</span>
      <div class="r-actions" id="ra-${r.id}"></div>`;

    const ac = div.querySelector(`#ra-${r.id}`);
    if(canApprove){
      ac.append(mkBtn('ra-btn ra-approve','✓ Aprobar', () => aprobar(r.id)));
      ac.append(mkBtn('ra-btn ra-reject', '✗ Rechazar',() => rechazar(r.id)));
    }
    if(canEdit)  ac.append(mkBtn('ra-btn ra-edit',  'Editar', () => editar(r)));
    if(esSrv)    ac.append(mkBtn('ra-btn ra-delete', '🗑',     () => eliminar(r)));
    if(!esSrv && esProp && r.estado === 'pendiente') ac.append(mkBtn('ra-btn ra-delete', '🗑 Cancelar', () => cancelarProp(r)));
    tLine.appendChild(div);
  });
}

/* ── Listas ── */
function renderListas(reservas){
  const pend = reservas.filter(r => r.estado === 'pendiente');
  const res  = reservas.filter(r => r.estado === 'reservado');
  const rech = reservas.filter(r => r.estado === 'rechazado');

  fill('lPend', pend, r => {
    const d = mkItem(r);
    d.querySelector('.ri-actions').append(
      mkBtn('btn btn-success ra-btn','✓ Aprobar', () => aprobar(r.id)),
      mkBtn('btn btn-warn ra-btn',  '✗ Rechazar',() => rechazar(r.id)),
      mkBtn('btn btn-primary ra-btn','Editar',   () => editar(r)),
      mkBtn('btn btn-danger ra-btn', 'Eliminar', () => eliminar(r))
    ); return d;
  });
  fill('lRes', res, r => {
    const d = mkItem(r);
    d.querySelector('.ri-actions').append(
      mkBtn('btn btn-primary ra-btn','Editar',  () => editar(r)),
      mkBtn('btn btn-danger ra-btn', 'Eliminar',() => eliminar(r))
    ); return d;
  });
  fill('lRech', rech, r => {
    const d = mkItem(r);
    d.querySelector('.ri-actions').append(mkBtn('btn btn-danger ra-btn','Eliminar',() => eliminar(r)));
    return d;
  });
}

function fill(id, items, builder){
  const el = $(id); if(!el) return;
  el.innerHTML = '';
  if(!items.length){ el.innerHTML = '<div class="empty">Sin registros</div>'; return; }
  items.forEach(r => el.appendChild(builder(r)));
}
function mkItem(r){
  const bc = r.estado==='pendiente' ? 'badge-p' : r.estado==='reservado' ? 'badge-r' : 'badge-x';
  const bt = r.estado==='pendiente' ? 'Pendiente' : r.estado==='reservado' ? 'Reservado' : 'Rechazado';
  const div = document.createElement('div'); div.className = 'res-item';
  div.innerHTML = `
    <div>
      <div class="ri-name">${r.cliente}</div>
      <div class="ri-sub">CI: ${r.ci} · ${fmt(r.inicio)} – ${fmt(r.inicio+r.duracion)}</div>
      <span class="r-badge ${bc}" style="margin-top:4px">${bt}</span>
    </div>
    <div class="ri-actions"></div>`;
  return div;
}
function mkBtn(cls, txt, cb){
  const b = document.createElement('button');
  b.className = cls; b.textContent = txt;
  b.onclick = e => { e.stopPropagation(); cb(); };
  return b;
}

   ACCIONES
══════════════════════════════════════════════ */
/* ── Mis solicitudes (vista cliente) ── */
function renderMisSolicitudes(reservas){
  if(!cliente.ci) return;
  const propias = reservas.filter(r => r.ci === cliente.ci && r.estado !== 'rechazado');
  const wrap = $('misReservas'); const list = $('misList');
  if(!wrap || !list) return;
  if(!propias.length){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = '';
  propias.forEach(r => {
    const d = mkItem(r);
    if(r.estado === 'pendiente'){
      d.querySelector('.ri-actions').append(
        mkBtn('btn btn-primary ra-btn','Editar',   () => editar(r)),
        mkBtn('btn btn-danger ra-btn', 'Cancelar', () => cancelarProp(r))
      );
    }
    list.appendChild(d);
  });
}

async function solicitar(){
  if(solicitando) return;

  const hora = $('fHora').value, dur = parseInt($('fDur').value, 10);
  const msgEl = $('fMsg');
  msgEl.textContent = ''; msgEl.style.color = '#f87171';
  if(!hora){ msgEl.textContent = 'Seleccione hora.'; return; }
  if(isNaN(dur) || dur < 15){ msgEl.textContent = 'Duración mínima 15 min.'; return; }
  const inicio = t2m(hora);
  if(inicio < OPEN || inicio + dur > CLOSE){ msgEl.textContent = 'Fuera de horario (13:00–24:00).'; return; }
  if(fecha === today() && inicio < nowMin()){ msgEl.textContent = 'No puede reservar en el pasado.'; return; }

  solicitando = true;
  const btn = $('btnSolicitar'); if(btn) btn.disabled = true; loader(true);
  let exito = false;
  try {
    const existentes = await fetchReservas(fecha);
    const m = $('fMsg');
    // Solo bloquear si ya hay una APROBADA en ese horario; pendientes pueden solaparse
    const soloAprobadas = existentes.filter(r => r.estado === 'reservado');
    if(overlap(inicio, dur, soloAprobadas)){
      if(m){ m.style.color='#f87171'; m.textContent = 'Ese horario ya está reservado.'; }
      return;
    }
    await insertReserva({
      id: uid(), fecha, inicio, duracion: dur,
      cliente: cliente.nombre, ci: cliente.ci,
      estado: 'pendiente', creado: Date.now()
    });
    exito = true;
    msg = {text:'Solicitud enviada — pendiente de aprobación.', type:'ok'};
    const m2 = $('fMsg');
    if(m2){ m2.style.color = '#86efac'; m2.textContent = '✓ ' + msg.text; }
    setTimeout(() => { solicitando = false; msg = {text:'',type:''}; renderApp(); }, 2000);
  } catch(e){
    console.error('solicitar', e);
    const m = $('fMsg');
    if(m){ m.style.color='#f87171'; m.textContent = 'Error al enviar: ' + (e.message || 'verifica tu conexión.'); }
  } finally {
    loader(false);
    if(!exito){
      solicitando = false;
      const b2 = $('btnSolicitar'); if(b2) b2.disabled = false;
    }
  }
}

async function aprobar(id){
  loader(true);
  try {
    const reservas = await fetchReservas(fecha);
    const r = reservas.find(x => x.id === id); if(!r) return;
    if(overlap(r.inicio, r.duracion, reservas, id))
      if(!confirm('Solapamiento. ¿Aprobar igualmente?')){ loader(false); return; }
    await rpc('srv_aprobar', {p_pin: srvPin, p_id: id});
    showMsg('Reserva aprobada.', 'ok');
  } catch(e){ showMsg(e.message || 'Error al aprobar.', 'err'); }
  finally { loader(false); renderApp(); }
}

async function rechazar(id){
  if(!confirm('¿Rechazar esta reserva?')) return;
  loader(true);
  try {
    await rpc('srv_rechazar', {p_pin: srvPin, p_id: id});
    showMsg('Reserva rechazada.', 'err');
  } catch(e){ showMsg(e.message || 'Error al rechazar.', 'err'); }
  finally { loader(false); renderApp(); }
}

async function editar(r){
  const esPropCliente = modo === 'cliente' && cliente.ci === r.ci && r.estado === 'pendiente';
  if(modo !== 'servidor' && !esPropCliente){ alert('No puedes editar esta reserva.'); return; }
  const nh = prompt('Nueva hora inicio (HH:MM):', fmt(r.inicio)); if(!nh) return;
  const nd = prompt('Nueva duración (min):', String(r.duracion)); if(!nd) return;
  const inicio = t2m(nh), dur = parseInt(nd, 10);
  if(isNaN(dur) || dur < 15){ alert('Duración inválida.'); return; }
  if(inicio < OPEN || inicio + dur > CLOSE){ alert('Fuera de horario (13:00–24:00).'); return; }
  loader(true);
  try {
    if(esPropCliente){
      await rpc('cli_editar', {p_ci: cliente.ci, p_id: r.id, p_inicio: inicio, p_duracion: dur});
    } else {
      const reservas = await fetchReservas(fecha);
      if(overlap(inicio, dur, reservas, r.id))
        if(!confirm('Solapamiento. ¿Aplicar igualmente?')){ loader(false); return; }
      await rpc('srv_editar', {p_pin: srvPin, p_id: r.id, p_inicio: inicio, p_duracion: dur, p_ci: null});
    }
    showMsg('Reserva actualizada.', 'ok');
  } catch(e){ showMsg(e.message || 'Error al editar.', 'err'); }
  finally { loader(false); renderApp(); }
}

async function cancelarProp(r){
  if(!confirm('¿Cancelar tu solicitud de ' + fmt(r.inicio) + '–' + fmt(r.inicio+r.duracion) + '?')) return;
  loader(true);
  try {
    await rpc('cli_eliminar', {p_ci: cliente.ci, p_id: r.id});
    showMsg('Solicitud cancelada.', 'err');
  } catch(e){ showMsg(e.message || 'Error al cancelar.', 'err'); }
  finally { loader(false); renderApp(); }
}

async function eliminar(r){
  if(!confirm(`¿Eliminar la reserva de ${r.cliente} (${fmt(r.inicio)}–${fmt(r.inicio+r.duracion)})?`)) return;
  loader(true);
  try {
    await rpc('srv_eliminar', {p_pin: srvPin, p_id: r.id});
    showMsg('Reserva eliminada.', 'ok');
  } catch(e){ showMsg(e.message || 'Error al eliminar.', 'err'); }
  finally { loader(false); renderApp(); }
}

async function verificarLlegada(){
  if(fecha !== today()){ showMsg('Seleccione la fecha de hoy.', 'err'); renderApp(); return; }
  loader(true);
  const reservas = await fetchReservas(fecha);
  loader(false);
  const ahora = nowMin();
  const act = reservas.find(r => r.estado === 'reservado' && ahora >= r.inicio && ahora < r.inicio + r.duracion);
  if(act) showMsg(`✓ Mesa ocupada: ${act.cliente} (CI ${act.ci}) · ${fmt(act.inicio)}–${fmt(act.inicio+act.duracion)}`, 'ok');
  else    showMsg('Sin reserva activa en este momento.', '');
  renderApp();
}

function showMsg(text, type){ msg = {text, type}; }

/* ── Offline ── */
const syncOffline = () => $('offlineBadge').classList.toggle('show', !navigator.onLine);
window.addEventListener('online', syncOffline);
window.addEventListener('offline', syncOffline);
syncOffline();

/* ── Service Worker ── */
let newWorker = null;
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if(newWorker.state === 'installed' && navigator.serviceWorker.controller)
            $('updateBanner').classList.add('show');
        });
      });
      $('btnUpdate').addEventListener('click', () => { if(newWorker) newWorker.postMessage('SKIP_WAITING'); });
      navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
      reg.update().catch(() => {});
    }).catch(() => {});
  });
}

/* ── Boot ── */
if(modo === 'servidor' && srvPin){
  suscribir();
  pedirPermiso();
  renderApp();
} else if(modo === 'cliente' && cliente.nombre){
  renderApp();
} else {
  // Limpiar cualquier estado corrupto y mostrar login
  ss.clear();
  modo = 'login'; srvPin = ''; cliente = {nombre:'', ci:''};
  renderLogin();
}

</script>
